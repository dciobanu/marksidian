name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Package (arm64)
        run: npx electron-builder --mac zip dmg --arm64 --publish never

      - name: Package (x64)
        run: npx electron-builder --mac zip dmg --x64 --publish never

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*.dmg

      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF##refs/tags/v}"

          ARM_SHA=$(shasum -a 256 "release/Marksidian-${VERSION}-arm64-mac.zip" | awk '{print $1}')
          X64_SHA=$(shasum -a 256 "release/Marksidian-${VERSION}-x64-mac.zip" | awk '{print $1}')

          echo "VERSION=${VERSION} ARM_SHA=${ARM_SHA} X64_SHA=${X64_SHA}"
          ls -la release/*.zip

          python3 << PYEOF
          import json, base64, urllib.request, os

          version = "${VERSION}"
          arm_sha = "${ARM_SHA}"
          x64_sha = "${X64_SHA}"
          token = os.environ["HOMEBREW_TAP_GITHUB_TOKEN"]

          cask = 'cask "marksidian" do\n'
          cask += '  arch arm: "arm64", intel: "x64"\n'
          cask += '\n'
          cask += f'  version "{version}"\n'
          cask += f'  sha256 arm:   "{arm_sha}",\n'
          cask += f'         intel: "{x64_sha}"\n'
          cask += '\n'
          cask += '  url "https://github.com/dciobanu/marksidian/releases/download/v#{version}/Marksidian-#{version}-#{arch}-mac.zip"\n'
          cask += '  name "Marksidian"\n'
          cask += '  desc "Markdown editor with Obsidian-style live preview"\n'
          cask += '  homepage "https://github.com/dciobanu/marksidian"\n'
          cask += '\n'
          cask += '  depends_on macos: ">= :monterey"\n'
          cask += '\n'
          cask += '  app "Marksidian.app"\n'
          cask += '\n'
          cask += '  postflight do\n'
          cask += '    system_command "xattr",\n'
          cask += '                   args: ["-cr", "#{appdir}/Marksidian.app"]\n'
          cask += '  end\n'
          cask += '\n'
          cask += '  zap trash: [\n'
          cask += '    "~/Library/Application Support/Marksidian",\n'
          cask += '    "~/Library/Preferences/com.marksidian.editor.plist",\n'
          cask += '    "~/Library/Saved Application State/com.marksidian.editor.savedState",\n'
          cask += '  ]\n'
          cask += 'end\n'

          content_b64 = base64.b64encode(cask.encode()).decode()
          api_url = "https://api.github.com/repos/dciobanu/homebrew-tap/contents/Casks/marksidian.rb"
          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json",
          }

          req = urllib.request.Request(api_url, headers=headers)
          try:
              with urllib.request.urlopen(req) as resp:
                  existing = json.loads(resp.read())
                  existing_sha = existing.get("sha", "")
          except Exception:
              existing_sha = ""

          payload = {
              "message": f"Update marksidian to {version}",
              "content": content_b64,
              "branch": "main",
          }
          if existing_sha:
              payload["sha"] = existing_sha

          req = urllib.request.Request(
              api_url,
              data=json.dumps(payload).encode(),
              headers=headers,
              method="PUT",
          )
          with urllib.request.urlopen(req) as resp:
              print(f"Cask updated: {resp.status}")
          PYEOF
